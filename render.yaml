databases:
  - name: luxury-laundry-db
    plan: free
    databaseName: luxury_laundry
    user: luxury_user

services:
  - type: web
    name: luxury-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run seed && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: luxury-laundry-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: "https://luxury-frontend.onrender.com"
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: luxury-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://luxury-backend.onrender.com"
